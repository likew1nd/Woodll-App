
<div class="ibox-content modal-form-shell">
    <form class="form-horizontal" id="updateSU">
        <div class="form-horizontal modal-form-body">
            <div class="col-sm-12" style="padding-left: 0px;">
                <div class="form-group" style="display:none;">
                    <label class="col-xs-2 col-sm-2 control-label">用户ID</label>

                    <div class="col-xs-10 col-sm-10">
                        <input type="text" class="form-control" name="id" value="{$softUser.id}">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">所属软件</label>

                    <div class="col-xs-10 col-sm-10">
                        <select class="form-control m-b selectpicker" name="sid" id="sid" data-live-search="true"
                                data-live-search-placeholder="搜索" data-style="btn-white" data-container="body">
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">用户账户</label>

                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="username" value="{$softUser.username}">
                    </div>
                    <label class="col-xs-2 col-sm-2 control-label">登录密码</label>

                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="password" placeholder="{$softUser.id>0?"修改密码时才输入此项":"请输入用户登录密码"}">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">机器码</label>
                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="maccode" value="{$softUser.maccode}">
                    </div>
                    <label class="col-xs-2 col-sm-2 control-label">换绑次数</label>
                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="modif_num" value="{$softUser.modif_num}">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">过期时间</label>
                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control layer-date" name="out_time" id="out_time"
                               value="{$softUser.out_time}">
                    </div>
                    <label class="col-xs-2 col-sm-2 control-label">用户点数</label>

                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="point" value="{$softUser.point}">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">qq</label>

                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="qq" value="{$softUser.qq}" placeholder="选填">
                    </div>
                    <label class="col-xs-2 col-sm-2 control-label">邮箱</label>

                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="email" value="{$softUser.email}" placeholder="选填">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">手机号</label>

                    <div class="col-xs-4 col-sm-4">
                        <input type="text" class="form-control" name="phone" value="{$softUser.phone}" placeholder="选填">
                    </div>
                    <label class="col-xs-2 col-sm-2 control-label">状态</label>

                    <div class="col-xs-4 col-sm-4">
                        <select class="form-control m-b selectpicker" name="status" data-live-search="true"
                                data-live-search-placeholder="搜索" data-style="btn-white" data-container="body">
                            <option {$softUser.status==0?"selected":""}>正常</option>
                            <option {$softUser.status==1?"selected":""}>锁定</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">作者备注</label>

                    <div class="col-xs-10 col-sm-10">
                        <textarea class="form-control" rows="3" placeholder="请输入内容"
                                  name="remark">{$softUser.remark}</textarea>
                    </div>
                </div>

            </div>
        </div>
        <div class="col-sm-12 modal-form-footer">
            <div class="col-xs-offset-5 col-sm-offset-5">
                <button class="btn btn-sm btn-white" type="submit" >{$sbName}</button>
                &nbsp;&nbsp;
                <button class="btn btn-sm btn-white" type="button" onclick="closeP()">{$cnName}</button>
            </div>
        </div>
    </form>
</div>
<script src="__ADMIN__/js/plugins/layer/laydate/laydate.js"></script>
<link href="__ADMIN__/css/bootstrap-select.min.css" rel="stylesheet"/>
<script src="__ADMIN__/js/bootstrap-select.min.js"></script>
<script src="__ADMIN__/js/i18n/defaults-zh_CN.min.js"></script>
<script>
    $.fn.selectpicker.Constructor.DEFAULTS.size = 5;

    function closeP() {
        //关闭iframe页面
        var index = parent.layer.getFrameIndex(window.name); //获取窗口索引
        parent.layer.close(index);
    }
    var out_time = {
        elem: "#out_time",
        format: "YYYY-MM-DD hh:mm:ss",
        max: "2099-06-16 23:59:59",
        istime: true,
        istoday: false,
        choose: function (datas) {
            end.min = datas;
            end.start = datas
        }
    };
  //  laydate(out_time);
    laydate.render({
        elem: '#out_time'
        ,type: 'datetime'
        ,min: '2019-05-01'
        ,max: '2038-01-01'
    });
    //jquery加载后执行的
    (function ($) {
        //ajax获取用户所有软件数据
        $.ajax({
            type: 'get',
            url: '/admin/soft/getSoftListsimple.html',
            cache: false,
            dataType: 'json',
            success: function (data) {
                //请求成功
                if (data.code < 0) {
                    showToast(data.msg, 'error');
                } else {
                    for (i = 0; i < data.total; i++) {
                        var pack = data.rows[i].name;
                        $("#sid").append($("<option value='" + data.rows[i].id + "'>" + pack + "</option>"))
                    }
                    $("#sid").selectpicker();
                    if ({$softUser.id}
                >
                    0
                ) //如果是修改用户信息
                    {
                        $("#sid").val('{$softUser.sid}');
                        $("#sid").selectpicker('val', '{$softUser.sid}');
                    }
                    $("#sid").selectpicker("refresh");
                }
            },
            error: function () {
                // view("异常！");
                showToast("网络错误！", 'error');
            }
        });
        //表单验证
        var icon = "<i class='fa fa-times-circle'></i> ";
        $("#updateSU").validate({
            rules: {
                username: {
                    required: true,
                    minlength: 6
                },
                maccode: {
                    required: true
                },
                out_time: {
                    required: true
                },
                point: {
                    required: true
                }
            },
            messages: {
                username: {
                    required: icon + "请输入用户名称 ",
                    minlength: icon + "用户名称必须6个字符以上"
                },
                password:{
                    required: icon + "请输入用户密码 ",
                    minlength: icon + "用户密码必须6个字符以上"
                }
            },
            submitHandler: function (form) {
                if($("#sid").val()=='' || $("#sid").val()==null)
                {
                    showToast('所属软件必须选择', 'error');
                    return false;
                }
                var formParam = $("#updateSU").serialize();
                //ajax提交更新用户数据
                $.ajax({
                    type: 'post',
                    url: '/admin/Soft_User/updateSoftUser.html',
                    data: formParam,
                    cache: false,
                    dataType: 'json',
                    success: function (data) {
                        //请求成功
                        if (data.code < 0) {
                            showToast(data.msg, 'error');
                        } else {
                            parent.layer.alert(data.msg || '操作成功', {
                                title: '提示',
                                btn: ['知道了']
                            }, function(index){
                                parent.layer.close(index);
                                try {
                                    if (window.parent && window.parent.$ && window.parent.$('.J_iframe:visible').length > 0) {
                                        var ciframe = window.parent.$('.J_iframe:visible')[0].contentWindow;
                                        if (ciframe.reload) { ciframe.reload(); } else { ciframe.location.reload(); }
                                    } else if (window.parent && window.parent.reload && typeof window.parent.reload === 'function') {
                                        window.parent.reload();
                                    }
                                } catch (e) {}
                                var idx = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(idx);
                            });

                        }
                    },
                    error: function () {
                        // view("异常！");
                        showToast("网络错误！", "error");
                    }
                });
            }
        });
    })(jQuery);
</script>
