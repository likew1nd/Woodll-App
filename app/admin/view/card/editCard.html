
<div class="ibox-content modal-form-shell">
    <form class="form-horizontal" id="editCard">
        <div class="form-horizontal modal-form-body">
            <div class="col-sm-12" style="padding-left: 0px;">
                <div class="form-group" style="display:none;">
                    <label class="col-xs-2 col-sm-2 control-label"></label>

                    <div class="col-xs-10 col-sm-10">
                        <input type="hidden" name="id" value="{$card.id}">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">所属软件</label>
                    <div class="col-xs-10 col-sm-10">
                        <select class="form-control m-b selectpicker" name="sid" id="sid" data-live-search="true"
                                data-live-search-placeholder="搜索" data-style="btn-white" data-container="body">
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">卡类型</label>
                    <div class="col-xs-10 col-sm-10">
                        <select class="form-control m-b selectpicker" name="type" id="type" data-live-search="true"
                                data-live-search-placeholder="搜索" data-style="btn-white" data-container="body">
                            <option value="0" {$card.type==0?"selected":""}>点卡</option>
                            <option value="1" {$card.type==1?"selected":""}>分卡</option>
                            <option value="2" {$card.type==2?"selected":""}>时卡</option>
                            <option value="3" {$card.type==3?"selected":""}>天卡</option>
                            <option value="4" {$card.type==4?"selected":""}>周卡</option>
                            <option value="5" {$card.type==5?"selected":""}>月卡</option>
                            <option value="6" {$card.type==6?"selected":""}>年卡</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">卡值</label>

                    <div class="col-xs-10 col-sm-10">
                        <input type="text" class="form-control" name="cardValue" value="{$card.cardValue}" placeholder="几天？几周？几年？几点">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-xs-2 col-sm-2 control-label">备注</label>

                    <div class="col-xs-10 col-sm-10">
                        <textarea class="form-control" rows="3" placeholder="请输入内容"
                                  name="remark">{$card.remark}</textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-12 modal-form-footer">
            <div class="col-xs-offset-5 col-sm-offset-5">
                <button class="btn btn-sm btn-white" type="submit" >{$sbName}</button>
                &nbsp;&nbsp;
                <button class="btn btn-sm btn-white" type="button" onclick="closeP()">{$cnName}</button>
            </div>
        </div>
    </form>
</div>
<script src="__ADMIN__/js/plugins/layer/laydate/laydate.js"></script>
<link href="__ADMIN__/css/bootstrap-select.min.css" rel="stylesheet"/>
<script src="__ADMIN__/js/bootstrap-select.min.js"></script>
<script src="__ADMIN__/js/i18n/defaults-zh_CN.min.js"></script>
<script>
    $.fn.selectpicker.Constructor.DEFAULTS.size = 5;
    function closeP() {
        //关闭iframe页面
        var index = parent.layer.getFrameIndex(window.name); //获取窗口索引
        parent.layer.close(index);
    }
    //jquery加载后执行的
    (function ($) {
        //ajax获取用户所有软件数据
        $.ajax({
            type: 'get',
            url: '/admin/soft/getSoftListsimple.html',
            cache: false,
            dataType: 'json',
            success: function (data) {
                //请求成功
                if (data.code < 0) {
                    showToast(data.msg, 'error');
                } else {
                    for (i = 0; i < data.total; i++) {
                        var pack = data.rows[i].name;
                        $("#sid").append($("<option value='" + data.rows[i].id + "'>" + pack + "</option>"))
                    }
                    if ('{$card.id|default="0"}' > 0) //如果是修改用户信息
                    {
                        $("#sid").selectpicker('val', '{$card.sid}');
                    }
                    $("#sid").selectpicker("refresh");
                }
            },
            error: function () {
                // view("异常！");
                showToast("网络错误！", 'error');
            }
        });
        //表单验证
        var icon = "<i class='fa fa-times-circle'></i> ";
        $("#editCard").validate({
            rules: {
                cardValue: {
                    required: true,
                    minlength: 1,
                    maxlength:8,
                    minNumber:2
                }
            },
            messages: {
                cardValue: {
                    required: icon + "请输入卡值 ",
                    minlength: icon + "卡值必须1-8个字符以上",
                    maxlength: icon + "卡值必须1-8个字符以上"
                }
            },
            submitHandler: function (form) {

                if($("#sid").val()=='' || $("#sid").val()==null)
                {
                    showToast('所属软件必须选择', 'error');
                    return false;
                }
                var formParam = $("#editCard").serialize();
                var formParam =formParam+"&"+"sname="+getSelectedText("sid");
                    //ajax提交更新用户数据
                $.ajax({
                    type: 'post',
                    url: '/admin/card/editCardType.html',
                    data: formParam,
                    cache: false,
                    dataType: 'json',
                    success: function (data) {
                        //请求成功
                        if (data.code < 0) {
                            showToast(data.msg, 'error');
                        } else {
                            parent.layer.alert(data.msg || '操作成功', {
                                title: '提示',
                                btn: ['知道了']
                            }, function(index){
                                parent.layer.close(index);
                                try {
                                    if (window.parent && window.parent.$ && window.parent.$('.J_iframe:visible').length > 0) {
                                        var ciframe = window.parent.$('.J_iframe:visible')[0].contentWindow;
                                        if (ciframe.reload) { ciframe.reload(); } else { ciframe.location.reload(); }
                                    } else if (window.parent && window.parent.reload && typeof window.parent.reload === 'function') {
                                        window.parent.reload();
                                    }
                                } catch (e) {}
                                var idx = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(idx);
                            });

                        }
                    },
                    error: function () {
                        // view("异常！");
                        showToast("网络错误！", "error");
                    }
                });
            }
        });
    })(jQuery);
    function getSelectedText(name){
        var obj=document.getElementById(name);
        for(i=0;i<obj.length;i++){
            if(obj[i].selected==true){
                return obj[i].innerText; //关键是通过option对象的innerText属性获取到选项文本
            }
        }
    }
</script>
