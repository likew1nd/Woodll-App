<link href="__ADMIN__/css/plugins/bootstrap-table/bootstrap-table.min.css" rel="stylesheet">

<body>

    <div class="panel-body" style="padding-bottom:0px;">
        <div class="ibox-content " style="padding-bottom: 0">
            <form role="form" class="form-inline" onsubmit="return false;" style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 15px;">
                <div class="form-group">
                    <label class="row-sm-2 control-label">软件名称：</label>
                    <select class="form-control selectpicker soft-search-select" id="sname" data-live-search="true" data-container="body"><option value="">全部</option></select>
                </div>
                <div class="form-group">
                    <label class="row-sm-2 control-label">充值卡类型：</label>
                    <select class="form-control selectpicker" id="cardType" data-style="btn-white" style="width: 120px;">
                        <option value="-1">全部</option>
                        <option value="0">点卡</option>
                        <option value="1">分卡</option>
                        <option value="2">时卡</option>
                        <option value="3">天卡</option>
                        <option value="4">周卡</option>
                        <option value="5">月卡</option>
                        <option value="6">年卡</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="row-sm-2 control-label">状态：</label>
                    <select class="form-control selectpicker" id="cardStatus" data-style="btn-white" style="width: 120px;">
                        <option value="-1">全部</option>
                        <option value="0">未使用</option>
                        <option value="1">已使用</option>
                        <option value="2">已封停</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="row-sm-2 control-label">使用者账号：</label>
                    <input type="text" id="userAccount" class="form-control" placeholder="请输入使用者账号" style="width: 140px;">
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"
                            onclick="javascript:search()">搜索</button>
                    </span>
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"
                            onclick="javascript:reload()">刷新</button>
                    </span>
                </div>

                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"
                            onclick="javascript:addCard()">添加卡密</button>
                    </span>
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"
                            onclick="javascript:exportCard()">导出卡密</button>
                    </span>
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"
                            onclick="javascript:deleteMoreCard()">高级删除</button>
                    </span>
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-danger" id="btn_delete_batch" style="margin-bottom:0px"
                            disabled onclick="javascript:deleteBatch()">删除</button>
                    </span>
                </div>
            </form>
        </div>
        <table id="tb_departments" data-show-fullscreen="true" data-show-export="true"
            class="table text-nowrap table-responsive"></table>
        <div id="customPager" class="custom-pager"></div>

    </div>

    <style>
        .custom-pager {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding: 14px 18px 18px;
            color: #c8d3e3;
            font-size: 13px;
        }

        .custom-pager button {
            min-width: 34px;
            height: 30px;
            padding: 0 10px;
            border: 1px solid rgba(99, 118, 154, .5);
            border-radius: 8px;
            background: rgba(27, 39, 62, .9);
            color: #dbe7ff;
            cursor: pointer;
        }

        .custom-pager button:hover:not(:disabled),
        .custom-pager button.active {
            border-color: #7c5cff;
            background: #7c5cff;
            color: #fff;
        }

        .custom-pager button:disabled {
            cursor: not-allowed;
            opacity: .45;
        }

        .custom-pager .custom-pager-info {
            margin-right: 8px;
            color: #91a3bd;
        }
    </style>

    <script>
        var customPagerState = {
            total: 0,
            limit: 10,
            offset: 0
        };

        $(function () {
var grid = {};
            var queryParamsArray = {};
            //1.初始化Table
            var oTable = new TableInit();
            oTable.Init();
            //2.初始化Button的点击事件
            var oButtonInit = new ButtonInit();
            oButtonInit.Init();

            $('#tb_departments').on('check.bs.table uncheck.bs.table check-all.bs.table uncheck-all.bs.table load-success.bs.table', function () {
                var selections = $('#tb_departments').bootstrapTable('getSelections');
                if (selections.length > 0) {
                    $('#btn_delete_batch').prop('disabled', false);
                } else {
                    $('#btn_delete_batch').prop('disabled', true);
                }
            });
        });


        var TableInit = function () {

            var oTableInit = new Object();
            //初始化Table
            oTableInit.Init = function () {
                grid = $('#tb_departments').bootstrapTable({
                    url: '/admin/card/getCardList',         //请求后台的URL（*）
                    method: 'get',                      //请求方式（*）
                    toolbar: '#toobar',//工具列
                    undefinedText: "无",
                    striped: true,//隔行换色
                    cache: false,//禁用缓存
                    pagination: true,//启动分页
                    sidePagination: 'server',//分页方式
                    pageNumber: 1,//初始化table时显示的页码
                    pageSize: 10,//每页条目
                    pageList: [10, 20, 50, 100],
                    showFooter: false,//是否显示列脚
                    showPaginationSwitch: false,//是否显示 数据条数选择框
                    sortable: false,//排序
                    search: false,//启用搜索
                    showColumns: false,//是否显示 内容列下拉框
                    showRefresh: false,//显示刷新按钮
                    idField: 'id',//key值栏位
                    // // height: $(window).height() - 100, //自定义表格的高度
                    //clickToSelect: true,//点击选中checkbox
                    // singleSelect: true,//启用单行选中
                    exportDataType: 'all',
                    queryParams: oTableInit.queryParams,
                    onLoadSuccess: function (data) {
                        try {
                            var rows = data.rows || data;
                            if (rows && rows.length) {
                                var rowCount = rows.length - 1;
                                var $table = $('#tb_departments');
                                if ($table.length && typeof $table.bootstrapTable === 'function') {
                                    $table.bootstrapTable('hideRow', { index: rowCount });
                                    $table.find("td").attr("data-tableexport-msonumberformat", "\@");
                                    $table.find("tr").attr("data-tableexport-display", "always");
                                }
                            }
                            renderCustomPager(data);
                        } catch (e) {
                            console.warn("onLoadSuccess error:", e);
                        }
                    },
                    onPageChange: function (number, size) {
                        try {
                            var $table = $('#tb_departments');
                            if ($table.length) {
                                $table.find("td").attr("data-tableexport-msonumberformat", "\@");
                                $table.find("tr").attr("data-tableexport-display", "always");
                            }
                        } catch (e) {
                            console.warn("onPageChange error:", e);
                        }
                    },
                    showExport: true,  //是否显示导出按钮
                    buttonsAlign: "right",  //按钮位置
                    exportTypes: ['excel'],  //导出文件类型
                    Icons: 'glyphicon-export',
                    columns: [{
                        checkbox: true
                    }, {
                        field: 'sname',
                        title: '所属软件',
                        align: 'center'
                    }, {
                        field: 'card_no',
                        title: '充值卡号',
                        align: 'center',
                        width: 300,
                        formatter: function (value, row, index) {
                            if (row.status == 1) {
                                return '<span style="text-decoration:line-through;">' + value + '</span>';
                            } else {
                                return value;
                            }
                        }
                    }, {
                        field: 'type',
                        title: '充值卡类型',
                        align: 'center',
                        formatter: function (value, row, index) {
                            if (value === '' || value === undefined) {
                                return '-';
                            }
                            switch (value) {
                                case 0: return '点卡'
                                case 1: return '分卡'
                                case 2: return '时卡'
                                case 3: return '天卡'
                                case 4: return '周卡'
                                case 5: return '月卡'
                                case 6: return '年卡'
                                default: return '-'
                            }
                        }
                    }, {
                        field: 'card_value',
                        title: '卡值',
                        align: 'center'
                    }, {
                        field: 'status',
                        title: '状态',
                        align: 'center',
                        formatter: function (value, row, index) {
                            if (value === '' || value === undefined) {
                                return '-';
                            }
                            if (value === 0) {
                                return '未被使用';
                            } else if (value === 1) {
                                return '已被使用';
                            } else {
                                return '已被封停';
                            }
                        }

                    }, {
                        field: 'user_account',
                        title: '使用者账号',
                        align: 'center'
                    }, {
                        field: 'remark',
                        title: '备注',
                        align: 'center',
                        formatter: function (value, row, index) {
                            return value == null ? "" : beautySub(value, 8);
                        }
                    }, {
                        field: 'add_time',
                        title: '创建时间',
                        align: 'center'
                    },
                    {
                        field: 'alt',
                        title: '操作',
                        formatter: function (value, row, index) {
                            var html = "";
                            if (row.status === 0) {
                                html = "<a onClick='javascript:stopUseCard(" + index + "," + row.id + ",2)'>封停</a>&nbsp;&nbsp;&nbsp;";
                            } else if (row.status === 1) {
                                html = "<a href='#'><span style='color:#999'>封停</span></a>&nbsp;&nbsp;&nbsp;";
                            } else {
                                html = "<a onClick='javascript:stopUseCard(" + index + "," + row.id + ",0)'><span style='color:red'>解封</span></a>&nbsp;&nbsp;&nbsp;";
                            }
                            html = html + "<a onClick='javascript:deleteCard(" + row.id + ")'>删除</a>";
                            return html;
                        }
                    }]
                });
            };

            oTableInit.queryParams = function (params) {
                customPagerState.limit = params.limit || customPagerState.limit;
                customPagerState.offset = params.offset || 0;
                var temp = {   //这里的键的名字 and 控制器的变量名必须一直，这边改动，控制器也需要改成一样的
                    limit: params.limit,   //页面大小
                    offset: params.offset,  //页码
                    sname: $("#sname").val(),
                    type: $("#cardType").val(),
                    status: $("#cardStatus").val(),
                    userAccount: $("#userAccount").val()
                };
                return temp;
            };
            return oTableInit;
        };


        var ButtonInit = function () {
            var oInit = new Object();
            var postdata = {};

            oInit.Init = function () {
                //初始化页面上面的按钮事件
            };

            return oInit;
        };
        function reload() {
            grid.bootstrapTable('refresh');
        }

        function renderCustomPager(data) {
            var total = parseInt(data && data.total ? data.total : 0, 10);
            var limit = parseInt(customPagerState.limit || 10, 10);
            var offset = parseInt(customPagerState.offset || 0, 10);
            var page = Math.floor(offset / limit) + 1;
            var pages = Math.max(Math.ceil(total / limit), 1);
            var $pager = $('#customPager');

            if (!total || pages <= 1) {
                $pager.empty();
                return;
            }

            var html = '<span class="custom-pager-info">共 ' + total + ' 条，第 ' + page + ' / ' + pages + ' 页</span>';
            html += '<button type="button" ' + (page <= 1 ? 'disabled' : '') + ' onclick="gotoCustomPage(' + (page - 1) + ')">上一页</button>';

            var start = Math.max(1, page - 2);
            var end = Math.min(pages, page + 2);
            if (start > 1) {
                html += '<button type="button" onclick="gotoCustomPage(1)">1</button>';
                if (start > 2) html += '<span>...</span>';
            }
            for (var i = start; i <= end; i++) {
                html += '<button type="button" class="' + (i === page ? 'active' : '') + '" onclick="gotoCustomPage(' + i + ')">' + i + '</button>';
            }
            if (end < pages) {
                if (end < pages - 1) html += '<span>...</span>';
                html += '<button type="button" onclick="gotoCustomPage(' + pages + ')">' + pages + '</button>';
            }

            html += '<button type="button" ' + (page >= pages ? 'disabled' : '') + ' onclick="gotoCustomPage(' + (page + 1) + ')">下一页</button>';
            $pager.html(html);
        }

        function gotoCustomPage(page) {
            if (!grid || page < 1) return;
            grid.bootstrapTable('refreshOptions', {
                pageNumber: page
            });
        }
    </script>

    <!-- Bootstrap table -->
    <script src="__ADMIN__/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>
    <script src="__ADMIN__/js/plugins/bootstrap-table/bootstrap-table-mobile.min.js"></script>
    <script src="__ADMIN__/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
    <script src="__ADMIN__/js/plugins/layer/laydate/laydate.js"></script>
    <script>

        function queryParams(params) {
            var resultParams = $.extend({}, params, oTableInit.queryParams);
            return resultParams;
        }

        function setQueryParams(key, value) {
            oTableInit.queryParams[key] = value;
        }
        function search() {
            $("#tb_departments").bootstrapTable("refreshOptions", { pageNumber: 1 });
            reload();
        }
        //导出卡密页面
        function exportCard() {
            parent.layer.open({
                type: 2,
                title: '{$user.username} - 导出卡密',
                shadeClose: true,
                shade: false,
                offset: '100px',
                area: ['800px', '300px'],
                content: ['/admin/card/exportCard.html', 'no']
            });
        }
        //卡密高级删除页面
        function deleteMoreCard() {
            parent.layer.open({
                type: 2,
                title: '{$user.username} - 卡密高级删除',
                shadeClose: true,
                shade: false,
                offset: '100px',
                area: ['800px', '310px'],
                content: ['/admin/card/deleteMoreCard.html', 'no']
            });
        }
        //添加用户
        function addCard() {
            parent.layer.open({
                type: 2,
                title: '{$user.username} - 添加卡密',
                shadeClose: true,
                shade: false,
                offset: '100px',
                area: ['800px', '350px'],
                content: ['/admin/card/addCard.html', 'no']
            });
        }
        //编辑用户
        function ediType(id) {
            parent.layer.open({
                type: 2,
                title: '{$user.username} - 卡类编辑',
                shadeClose: true,
                shade: false,
                offset: '100px',
                area: ['800px', '330px'],
                content: ['/admin/card/addType.html?id=' + id, 'no']
            });
        }
        //删除软件用户
        function deleteCard(id) {
            if (id == '') {
                showToast("卡类编号不能缺省", "info");
            } else {
                layer.confirm("删除会导致相关数据不可恢复<br>您确定要删除该卡密吗？", { title: '温馨提示', formType: 1 }, function (index) {
                    $.ajax({
                        url: "/admin/card/deleteCard.html?id=" + id,
                        type: "post",
                        dataType: "json",
                        data: "id=" + id,
                        success: function (data) {
                            if (data.code == 0) {
                                showToast(data.msg, 'success')
                                layer.close(index);
                                reload();
                            } else {
                                showToast(data.msg, 'success')
                            }
                        },
                        error: function (XMLHttpRequest, textStatus, errorThrown) {
                            showToast("系统在开小差，请稍后再试", "info");
                        }
                    });
                });
            }
        }
        function deleteBatch() {
            var selections = $('#tb_departments').bootstrapTable('getSelections');
            if (selections.length <= 0) return;
            layer.confirm("删除会导致相关数据不可恢复<br>您确定要批量删除这 " + selections.length + " 个卡密吗？", { title: '温馨提示', formType: 1 }, function (index) {
                layer.close(index);
                var ids = selections.map(function(row) { return row.id; });
                var completed = 0;
                var successCount = 0;
                var loadIndex = layer.load(2);
                function deleteNext() {
                    if (completed >= ids.length) {
                        layer.close(loadIndex);
                        showToast("成功删除了 " + successCount + " 个卡密", "success");
                        reload();
                        return;
                    }
                    var id = ids[completed];
                    $.ajax({
                        url: "/admin/card/deleteCard.html?id=" + id,
                        type: "post",
                        dataType: "json",
                        data: "id=" + id,
                        success: function (data) {
                            if (data.code == 0) {
                                successCount++;
                            }
                            completed++;
                            deleteNext();
                        },
                        error: function () {
                            completed++;
                            deleteNext();
                        }
                    });
                }
                deleteNext();
            });
        }
        //检测心跳时间,判断是否在线
        function checkOnline(date) {
            date = date.substring(0, 19);
            date = date.replace(/-/g, '/');
            var timestamp = new Date(date).getTime() / 1000;
            var now = new Date().getTime() / 1000;
            return timestamp < (now - 61);
        }
        function stopUseCard(index, id, status) {
            $.ajax({
                url: "/admin/card/updateCardStatus.html",
                type: "post",
                dataType: "json",
                data: "id=" + id + "&status=" + status,
                success: function (msg) {
                    if (parseInt(msg.code) == 0) {
                        //成功改变表格的操作内容
                        var rows = {
                            index: index,  //更新列所在行的索引
                            field: "status", //要更新列的field
                            value: parseInt(msg.status) //要更新列的数据
                        }//更新表格数据
                        $('#tb_departments').bootstrapTable("updateCell", rows);
                    } else {
                        showToast(msg.msg, 'error');
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    showTip("系统在开小差，请稍后再试");
                }
            });



        }
        function beautySub(str, len) {
            var reg = /[\u4e00-\u9fa5]/g,    //专业匹配中文
                slice = str.substring(0, len),
                chineseCharNum = (~~(slice.match(reg) && slice.match(reg).length)),
                realen = slice.length * 2 - chineseCharNum;
            return str.substr(0, realen) + (realen < str.length ? "..." : "");
        }

    </script>
