                                        if (!isNaN(hVal)) {

                                        }

        if (!document.getElementById('__cyber-toast-style__')) {

            s.id = '__cyber-toast-style__';

            s.innerHTML = [

                '#__cyber-toast-container__ {',

                '  position: fixed;',

                '  top: 18px;',

                '  right: 18px;',

                '  z-index: 999999;',

                '  display: flex;',

                '  flex-direction: column;',

                '  gap: 10px;',

                '  pointer-events: none;',

                '}',

                '.__cyber-toast {',

                '  min-width: 260px;',

                '  max-width: 360px;',

                '  padding: 13px 18px 13px 16px;',

                '  border-radius: 12px;',

                '  display: flex;',

                '  align-items: center;',

                '  gap: 11px;',

                '  font-family: "Inter", sans-serif;',

                '  font-size: 14px;',

                '  font-weight: 500;',

                '  color: #f1f5f9;',

                '  letter-spacing: 0.2px;',

                '  pointer-events: auto;',

                '  backdrop-filter: blur(18px);',

                '  -webkit-backdrop-filter: blur(18px);',

                '  border: 1px solid rgba(255,255,255,0.07);',

                '  box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.03);',

                '  transform: translateX(110%);',

                '  opacity: 0;',

                '  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease;',

                '  position: relative;',

                '  overflow: hidden;',

                '}',

                '.__cyber-toast.show {',

                '  transform: translateX(0);',

                '  opacity: 1;',

                '}',

                '.__cyber-toast.hide {',

                '  transform: translateX(110%);',

                '  opacity: 0;',

                '}',

                '.__cyber-toast::before {',

                '  content: "";',

                '  position: absolute;',

                '  left: 0; top: 0; bottom: 0;',

                '  width: 3px;',

                '  border-radius: 12px 0 0 12px;',

                '}',

                /* Progress bar */

                '.__cyber-toast-bar {',

                '  position: absolute;',

                '  bottom: 0; left: 0;',

                '  height: 2px;',

                '  border-radius: 0 0 12px 12px;',

                '  animation: __cyber-bar-shrink 3s linear forwards;',

                '}',

                '@keyframes __cyber-bar-shrink {',

                '  from { width: 100%; }',

                '  to   { width: 0%; }',

                '}',

                /* Success */

                '.__cyber-toast--success {',

                '  background: linear-gradient(135deg, rgba(16,24,48,0.55) 0%, rgba(10,30,50,0.55) 100%);',

                '}',

                '.__cyber-toast--success::before { background: #10b981; box-shadow: 0 0 10px #10b981; }',

                '.__cyber-toast--success .__cyber-toast-icon { color: #10b981; filter: drop-shadow(0 0 6px #10b981); }',

                '.__cyber-toast--success .__cyber-toast-bar { background: linear-gradient(90deg, #10b981, #34d399); }',

                /* Error */

                '.__cyber-toast--error {',

                '  background: linear-gradient(135deg, rgba(40,10,10,0.55) 0%, rgba(30,10,20,0.55) 100%);',

                '}',

                '.__cyber-toast--error::before { background: #ef4444; box-shadow: 0 0 10px #ef4444; }',

                '.__cyber-toast--error .__cyber-toast-icon { color: #ef4444; filter: drop-shadow(0 0 6px #ef4444); }',

                '.__cyber-toast--error .__cyber-toast-bar { background: linear-gradient(90deg, #ef4444, #fca5a5); }',

                /* Warning */

                '.__cyber-toast--warning {',

                '  background: linear-gradient(135deg, rgba(40,30,5,0.55) 0%, rgba(30,20,5,0.55) 100%);',

                '}',

                '.__cyber-toast--warning::before { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }',

                '.__cyber-toast--warning .__cyber-toast-icon { color: #f59e0b; filter: drop-shadow(0 0 6px #f59e0b); }',

                '.__cyber-toast--warning .__cyber-toast-bar { background: linear-gradient(90deg, #f59e0b, #fcd34d); }',

                /* Info */

                '.__cyber-toast--info {',

                '  background: linear-gradient(135deg, rgba(5,20,45,0.55) 0%, rgba(5,15,40,0.55) 100%);',

                '}',

                '.__cyber-toast--info::before { background: #38bdf8; box-shadow: 0 0 10px #38bdf8; }',

                '.__cyber-toast--info .__cyber-toast-icon { color: #38bdf8; filter: drop-shadow(0 0 6px #38bdf8); }',

                '.__cyber-toast--info .__cyber-toast-bar { background: linear-gradient(90deg, #38bdf8, #7dd3fc); }',

                /* Icon */

                '.__cyber-toast-icon {',

                '  font-size: 18px;',

                '  flex-shrink: 0;',

                '  line-height: 1;',

                '}',

                '.__cyber-toast-msg {',

                '  flex: 1;',

                '  line-height: 1.45;',

                '  word-break: break-word;',

                '}'

            ].join('');

            document.head.appendChild(s);

        }



        // Get or create container

        function getContainer() {

            var c = document.getElementById('__cyber-toast-container__');

            if (!c) {

                c = document.createElement('div');

                c.id = '__cyber-toast-container__';

                document.body.appendChild(c);

            }

            return c;

        }



        var ICONS = {

            success: '✓',

            error: '✕',

            warning: '⚠',

            info: 'ℹ'

        };



        window.showToast = function (msg, type, duration) {

            type = type || 'info';

            duration = duration || 3000;

            var container = getContainer();



            var el = document.createElement('div');

            el.className = '__cyber-toast __cyber-toast--' + type;

            el.innerHTML = [

                '<span class="__cyber-toast-icon">' + (ICONS[type] || 'ℹ') + '</span>',

                '<span class="__cyber-toast-msg">' + msg + '</span>',

                '<div class="__cyber-toast-bar" style="animation-duration:' + (duration / 1000) + 's"></div>'

            ].join('');



            container.appendChild(el);



            // Trigger enter animation

            setTimeout(function () { el.classList.add('show'); }, 10);



            // Auto remove

            var timer = setTimeout(function () {

                el.classList.add('hide');

                setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 400);

            }, duration);



            // Pause on hover

            el.addEventListener('mouseenter', function () { clearTimeout(timer); el.querySelector('.__cyber-toast-bar').style.animationPlayState = 'paused'; });

            el.addEventListener('mouseleave', function () {

                el.querySelector('.__cyber-toast-bar').style.animationPlayState = 'running';

                timer = setTimeout(function () {

                    el.classList.add('hide');

                    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 400);

                }, 800);

            });

        };

    })();

    $(function() {
        if (window.jQuery && $.fn.selectpicker && $.fn.selectpicker.Constructor) {
            $.fn.selectpicker.Constructor.DEFAULTS.size = 6;
        }
        var $selects = $(".soft-search-select");
        if ($selects.length > 0) {
            $.ajax({
                type: "get",
                url: "/admin/soft/getSoftListsimple.html",
                cache: false,
                dataType: "json",
                success: function (data) {
                    if (data && data.code === 0 && data.rows) {
                        $selects.each(function() {
                            var $sel = $(this);
                            var val = $sel.val() || "";
                            $sel.empty();
                            $sel.append('<option value="">全部</option>');
                            for (var i = 0; i < data.total; i++) {
                                var name = data.rows[i].name;
                                $sel.append('<option value="' + name + '">' + name + '</option>');
                            }
                            $sel.selectpicker({ size: 6 });
                            $sel.selectpicker("refresh");
                            if (val) {
                                $sel.selectpicker("val", val);
                            }
                        });
                    }
                }
            });
        }
    });

</script>
