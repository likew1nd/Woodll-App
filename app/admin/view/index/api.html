<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOODLL 网络验证 - 客户端 API 说明文档</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* ==========================================
           WOODLL Premium Cyberpunk Dark Theme Styles
           ========================================== */
        :root {
            --bg-main: #030712;
            --bg-sidebar: #090d16;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-code: #0b0f19;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-glow: rgba(56, 189, 248, 0.2);

            --text-main: #cbd5e1;
            --text-heading: #f8fafc;
            --text-muted: #64748b;

            --color-primary: #38bdf8;
            /* Cyan */
            --color-primary-rgb: 56, 189, 248;
            --color-accent: #a855f7;
            /* Purple */
            --color-success: #10b981;
            /* Emerald */
            --color-error: #ef4444;
            /* Red */
            --color-warning: #f59e0b;
            /* Amber */

            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            height: 100vh;
            padding: 15px !important;
            gap: 15px !important;
        }

        /* Webkit scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }

        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 4px;
            border: 2px solid var(--bg-main);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }

        /* ==========================================
           Sidebar Layout
           ========================================== */
        aside {
            width: 320px;
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            display: flex;
            height: 100%;
            flex-shrink: 0;
            z-index: 10;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px 10px 38px;
            color: var(--text-heading);
            font-size: 13px;
            transition: var(--transition-smooth);
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px 24px;
        }

        .menu-category {
            margin-bottom: 24px;
        }

        .category-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0 12px 8px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 13.5px;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-bottom: 4px;
        }

        .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-heading);
        }

        .menu-item.active {
            background-color: rgba(56, 189, 248, 0.08);
            border-left: 3px solid var(--color-primary);
            color: var(--color-primary);
            font-weight: 500;
        }

        .badge-wtype {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            color: var(--text-muted);
        }

        .menu-item.active .badge-wtype {
            background-color: rgba(56, 189, 248, 0.2);
            color: var(--color-primary);
        }

        /* ==========================================
           Main Workspace Layout
           ========================================== */
        main {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            background-color: transparent !important;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            flex-shrink: 0;
            background-color: rgba(9, 13, 22, 0.6);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-heading);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .meta-item strong {
            color: var(--text-main);
        }

        .workspace {
            padding: 0 !important;
            max-width: 100% !important;
            width: 100% !important;
            margin: 0 !important;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Panel card */
        .api-card {
            background-color: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            padding: 24px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(16px) !important;
            margin-bottom: 0 !important;
            flex: 1;
        }

        .api-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .method-badge {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            background-color: var(--color-success);
            color: white;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .endpoint-path {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-heading);
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .api-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .api-description {
            font-size: 15px;
            color: var(--text-main);
            margin-bottom: 24px;
            border-left: 3px solid var(--color-primary);
            padding-left: 16px;
        }

        /* Tabs System */
        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
            gap: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: var(--transition-smooth);
        }

        .tab-btn:hover {
            color: var(--text-heading);
        }

        .tab-btn.active {
            color: var(--color-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--color-primary);
            box-shadow: 0 0 8px var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Parameter Table Styling */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: rgba(9, 13, 22, 0.4);
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13.5px;
        }

        th {
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text-heading);
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.01);
        }

        .param-name {
            font-family: var(--font-mono);
            color: var(--color-primary);
            font-weight: 500;
        }

        .param-type {
            font-family: var(--font-mono);
            color: var(--color-accent);
            font-size: 12px;
        }

        .param-req {
            font-weight: 600;
        }

        .param-req.yes {
            color: var(--color-error);
        }

        .param-req.no {
            color: var(--text-muted);
        }

        /* Code Blocks styling */
        .code-container {
            position: relative;
            background-color: #0b0f19 !important;
            border: 1px solid rgba(56, 189, 248, 0.15) !important;
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background-color: rgba(255, 255, 255, 0.02) !important;
            border-bottom: 1px solid rgba(56, 189, 248, 0.15) !important;
            font-size: 12px;
            color: var(--text-muted);
        }

        .code-lang {
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }

        .btn-copy:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-heading);
            border-color: var(--color-primary);
        }

        pre {
            margin: 0 !important;
            padding: 20px !important;
            overflow-x: auto !important;
            background-color: #0b0f19 !important;
        }

        code {
            font-family: var(--font-mono) !important;
            font-size: 13.5px !important;
            color: #34d399 !important;
            /* Soft Emerald Code Color for readability */
            background-color: transparent !important;
        }

        /* Toast system */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--color-success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            font-weight: 500;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* General Guide Block markup */
        .guide-section {
            margin-bottom: 24px;
        }

        .guide-section h3 {
            font-size: 16px;
            color: var(--text-heading);
            margin-bottom: 12px;
            margin-top: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .guide-section p {
            margin-bottom: 12px;
            font-size: 14.5px;
        }

        .guide-section ul {
            padding-left: 20px;
            margin-bottom: 16px;
        }

        .guide-section li {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .guide-section code {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            color: var(--color-primary);
            font-size: 12.5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Mobile layout adjustments */
        @media (max-width: 991px) {
            body {
                flex-direction: column;
            }

            aside {
                width: 100%;
                height: auto;
                max-height: 400px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            header {
                padding: 0 20px;
            }

            .workspace {
                padding: 20px;
            }

            .api-card {
                padding: 20px;
            }
        }
    </style>
</head>

        // Render Sidebar Menu
        function renderSidebar(filter = "") {
            const container = document.getElementById("sidebarMenu");
            container.innerHTML = "";

            projectData.categories.forEach(cat => {
                // Filter items
                const filteredItems = cat.items.filter(item =>
                    item.name.toLowerCase().includes(filter.toLowerCase()) ||
                    (item.wtype && String(item.wtype).includes(filter))
                );

                if (filteredItems.length === 0) return;

                const catEl = document.createElement("div");
                catEl.className = "menu-category";

                const titleEl = document.createElement("div");
                titleEl.className = "category-title";
                titleEl.textContent = cat.title;
                catEl.appendChild(titleEl);

                const listEl = document.createElement("ul");
                listEl.className = "menu-list";

                filteredItems.forEach(item => {
                    const itemEl = document.createElement("li");
                    itemEl.className = "menu-item";
                    itemEl.id = `menu-${item.id}`;
                    itemEl.onclick = () => selectApi(item.id);

                    const nameSpan = document.createElement("span");
                    nameSpan.textContent = item.name;
                    itemEl.appendChild(nameSpan);

                    if (item.wtype) {
                        const badge = document.createElement("span");
                        badge.className = "badge-wtype";
                        badge.textContent = `wtype: ${item.wtype}`;
                        itemEl.appendChild(badge);
                    }

                    listEl.appendChild(itemEl);
                });

                catEl.appendChild(listEl);
                container.appendChild(catEl);
            });
        }

        // Active State Selection
        let currentActiveId = "guide";

        function selectApi(id) {
            // Remove previous active classes
            const prevActive = document.querySelector(".menu-item.active");
            if (prevActive) prevActive.classList.remove("active");

            const newActive = document.getElementById(`menu-${id}`);
            if (newActive) newActive.classList.add("active");

            currentActiveId = id;

            // Find API data
            let foundItem = null;
            for (let cat of projectData.categories) {
                foundItem = cat.items.find(i => i.id === id);
                if (foundItem) break;
            }

            if (foundItem) {
                renderDetail(foundItem);
            }
        }

        // Render Detail Workspace Panel
        function renderDetail(item) {
            const container = document.getElementById("detailContainer");
            container.innerHTML = "";

            if (item.isStatusCodes) {
                // Render status codes page
                container.innerHTML = `
                    <h2 class="api-title">${item.name}</h2>
                    <div class="api-description">${item.description}</div>

                        </div>
                        <pre><code id="code-failure-text">${JSON.stringify(item.failureResponse, null, 4)}</code></pre>
                    </div>
                </div>
            `;
        }

        // Tab switcher controller
        function switchTab(event, tabId) {
            const container = event.target.parentElement;

            // Remove active buttons classes
            container.querySelectorAll(".tab-btn").forEach(btn => {
                btn.classList.remove("active");
            });
            event.target.classList.add("active");

            // Hide all panels
            const panels = container.parentElement.querySelectorAll(".tab-content");
            panels.forEach(p => {
                p.classList.remove("active");
            });

            // Show target panel
            document.getElementById(tabId).classList.add("active");
        }

        // Search Input controller
        function handleSearch() {
            const filter = document.getElementById("searchInput").value;
            renderSidebar(filter);

            // Re-apply active state to current item if it still exists
            const activeEl = document.getElementById(`menu-${currentActiveId}`);
            if (activeEl) {
                activeEl.classList.add("active");
            }
        }

        // Clipboard Copy implementation
        function copyCode(elementId) {
            const codeText = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                const toast = document.getElementById("copyToast");
                toast.classList.add("show");
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 2000);
            }).catch(err => {
                console.error("Could not copy text: ", err);
            });
        }

        // Initialization
        window.onload = () => {
            renderSidebar();
            selectApi("guide");
        };
    </script>
</body>
