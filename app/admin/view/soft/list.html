<body>

    <div class="panel-body" style="padding-bottom:0px;">
        <div class="ibox-content " style="padding-bottom: 0">
            <form role="form" class="form-inline" onsubmit="return false;">
                <div class="form-group">
                    <label class="row-sm-2 control-label">软件名称：</label>
                    <select class="form-control selectpicker soft-search-select" id="softName" data-live-search="true"
                        data-container="body">
                        <option value="">全部</option>
                    </select>
                    <span class="form-group-btn">

                    </span>
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"

                    </span>
                </div>
                <div class="form-group">
                    <span class="form-group-btn">
                        <button type="button" class="btn btn-primary" style="margin-bottom:0px"

                <div class="form-group">
                    <span class="form-group-btn">

            </form>
        </div>

        <table id="tb_departments" data-show-fullscreen="true" data-show-export="true"
            class="table text-nowrap table-responsive"></table>
        <div id="softPager" class="soft-pager"></div>

    </div>

    <style>
        .soft-pager {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding: 14px 18px 18px;
            color: #c8d3e3;
            font-size: 13px;
        }

        .soft-pager button {
            min-width: 34px;
            height: 30px;
            padding: 0 10px;
            border: 1px solid rgba(99, 118, 154, .5);
            border-radius: 8px;
            background: rgba(27, 39, 62, .9);
            color: #dbe7ff;
            cursor: pointer;
        }

        .soft-pager button:hover:not(:disabled),
        .soft-pager button.active {
            border-color: #7c5cff;
            background: #7c5cff;
            color: #fff;
        }

        .soft-pager button:disabled {
            cursor: not-allowed;
            opacity: .45;
        }

        .soft-pager .soft-pager-info {
            margin-right: 8px;
            color: #91a3bd;
        }

        /* Custom Layer Confirm styles to match dark mode */

            border-radius: 12px !important;

            background: #0f172a !important;

    <script>
        var grid = null;
        var softPagerState = {
            total: 0,
            limit: 10,
            offset: 0
        };

        $(function () {
            var queryParamsArray = {};
            //1.初始化Table
            var oTable = new TableInit();
            oTable.Init();
            //2.初始化Button的点击事件
            var oButtonInit = new ButtonInit();
            oButtonInit.Init();

            $('#tb_departments').on('check.bs.table uncheck.bs.table check-all.bs.table uncheck-all.bs.table load-success.bs.table', function () {
                var selections = $('#tb_departments').bootstrapTable('getSelections');
                if (selections.length > 0) {
                    $('#btn_delete_batch').prop('disabled', false);
                } else {
                    $('#btn_delete_batch').prop('disabled', true);
                }
            });
        });


        var TableInit = function () {

            var oTableInit = new Object();
            //初始化Table
            oTableInit.Init = function () {
                grid = $('#tb_departments').bootstrapTable({
                    url: '/admin/soft/getSoftList',         //请求后台的URL（*）
                    method: 'get',                      //请求方式（*）
                    toolbar: '#toobar',//工具列
                    undefinedText: "无",
                    striped: true,//隔行换色
                    cache: false,//禁用缓存
                    pagination: true,//启动分页
                    sidePagination: 'server',//分页方式
                    pageNumber: 1,//初始化table时显示的页码
                    pageSize: 10,//每页条目
                    pageList: [10, 20, 50, 100],
                    showFooter: false,//是否显示列脚
                    showPaginationSwitch: false,//是否显示 数据条数选择框
                    sortable: false,//排序
                    search: false,//启用搜索
                    showColumns: false,//是否显示 内容列下拉框
                    showRefresh: false,//显示刷新按钮
                    // // height: $(window).height() - 100, //自定义表格的高度
                    idField: 'id',//key值栏位
                    //clickToSelect: true,//点击选中checkbox
                    // singleSelect: true,//启用单行选中
                    exportDataType: 'all',
                    queryParams: oTableInit.queryParams,
                    onLoadSuccess: function (data) {
                        try {
                            var rows = data.rows || data;
                            if (rows && rows.length) {
                                var rowCount = rows.length - 1;
                                var $table = $('#tb_departments');
                                if ($table.length && typeof $table.bootstrapTable === 'function') {
                                    $table.bootstrapTable('hideRow', { index: rowCount });
                                    $table.find("td").attr("data-tableexport-msonumberformat", "\@");
                                    $table.find("tr").attr("data-tableexport-display", "always");
                                }
                            }
                            renderSoftPager(data);
                        } catch (e) {
                            console.warn("onLoadSuccess error:", e);
                        }
                    },
                    onPageChange: function (number, size) {
                        try {
                            var $table = $('#tb_departments');
                            if ($table.length) {
                                $table.find("td").attr("data-tableexport-msonumberformat", "\@");
                                $table.find("tr").attr("data-tableexport-display", "always");
                            }
                        } catch (e) {
                            console.warn("onPageChange error:", e);
                        }
                    },
                    showExport: true,  //是否显示导出按钮
                    buttonsAlign: "right",  //按钮位置
                    exportTypes: ['excel'],  //导出文件类型
                    Icons: 'glyphicon-export',
                    columns: [{
                        checkbox: true
                    }, {
                        field: 'id',
                        title: '软件编号',
                        align: 'center'
                    }, {
                        field: 'name',
                        title: '软件名称',
                        align: 'center'
                    }, {
                        field: 'key',
                        title: '软件密钥',
                        align: 'center'
                    }, {
                        field: 'count',
                        title: '用户数',
                        align: 'center'
                    }, {
                        field: 'online_count',
                        title: '在线',
                        align: 'center'
                    }, {
                        field: 'expired_count',
                        title: '到期',
                        align: 'center'
                    }, {
                        field: 'unused_cards_count',
                        title: '剩余卡密',
                        align: 'center'
                    }, {
                        field: 'version',
                        title: '最新版本',
                        align: 'center',
                        formatter: function (value, row, index) {
                            var html = "<a onclick=\"parent.addMenuTab('admin/Soft/ver.html?id=" + row.id + "','" + row.name + " - 管理版本','" + row.id + "');\">版本管理</a>";
                            return value + " " + html;
                        }
                    }, {
                        field: 'status',
                        title: '状态',
                        align: 'center',
                        formatter: function (value, row, index) {
                            if (value == '收费') {
                                return '<a class="btn btn-primary btn-rounded btn-xs">收费</a>';
                            }
                            if (value == '免费') {
                                return '<a class="btn btn-warning btn-rounded btn-xs">免费</a>';
                            } else {
                                return '<a class="btn btn-default btn-rounded btn-xs">关闭</a>';
                            }
                        }
                    }, {
                        field: 'add_time',
                        title: '操作',
                        formatter: function (value, row, index) {
                            var html = "<a onClick='javascript:editSoft(" + row.id + ")'>编辑</a>&nbsp;&nbsp;" +
                                "<a onClick='javascript:deleteSoft(" + row.id + ")'>删除</a>&nbsp;&nbsp;" +
                                "<a onclick=\"javascript:sendMsgPage(" + row.id + ")\">群发消息</a>";
                            return html;
                        }
                    },]
                });
            };

            //得到查询的参数
            oTableInit.queryParams = function (params) {
                softPagerState.limit = params.limit || softPagerState.limit;
                softPagerState.offset = params.offset || 0;
                var temp = {   //这里的键的名字和控制器的变量名必须一直，这边改动，控制器也需要改成一样的
                    limit: params.limit,   //页面大小
                    offset: params.offset,  //页码
                    name: $("#softName").val()
                };
                return temp;
            };
            return oTableInit;
        };


        var ButtonInit = function () {
            var oInit = new Object();
            var postdata = {};

            oInit.Init = function () {
                //初始化页面上面的按钮事件
            };

            return oInit;
        };
        function reload() {
            grid.bootstrapTable('refresh');
        }

        function renderSoftPager(data) {
            var total = parseInt(data && data.total ? data.total : 0, 10);
            var limit = parseInt(softPagerState.limit || 10, 10);
            var offset = parseInt(softPagerState.offset || 0, 10);
            var page = Math.floor(offset / limit) + 1;
            var pages = Math.max(Math.ceil(total / limit), 1);
            var $pager = $('#softPager');

            if (!total || pages <= 1) {
                $pager.empty();
                return;
            }

            var html = '<span class="soft-pager-info">共 ' + total + ' 条，第 ' + page + ' / ' + pages + ' 页</span>';
            html += '<button type="button" ' + (page <= 1 ? 'disabled' : '') + ' onclick="gotoSoftPage(' + (page - 1) + ')">上一页</button>';

            var start = Math.max(1, page - 2);
            var end = Math.min(pages, page + 2);
            if (start > 1) {
                html += '<button type="button" onclick="gotoSoftPage(1)">1</button>';
                if (start > 2) html += '<span>...</span>';
            }
            for (var i = start; i <= end; i++) {
                html += '<button type="button" class="' + (i === page ? 'active' : '') + '" onclick="gotoSoftPage(' + i + ')">' + i + '</button>';
            }
            if (end < pages) {
                if (end < pages - 1) html += '<span>...</span>';
                html += '<button type="button" onclick="gotoSoftPage(' + pages + ')">' + pages + '</button>';
            }

            html += '<button type="button" ' + (page >= pages ? 'disabled' : '') + ' onclick="gotoSoftPage(' + (page + 1) + ')">下一页</button>';
            $pager.html(html);
        }

        function gotoSoftPage(page) {
            if (!grid || page < 1) return;
            grid.bootstrapTable('refreshOptions', {
                pageNumber: page
            });
        }
    </script>

    <!-- Bootstrap table -->
    <script src="__ADMIN__/js/plugins/bootstrap-table/bootstrap-table.min.js"></script>

    <script src="__ADMIN__/js/plugins/bootstrap-table/locale/bootstrap-table-zh-CN.min.js"></script>
    <script src="__ADMIN__/js/plugins/layer/laydate/laydate.js"></script>
    <script>

        function queryParams(params) {
            var resultParams = $.extend({}, params, oTableInit.queryParams);
            return resultParams;
        }

        function setQueryParams(key, value) {
            oTableInit.queryParams[key] = value;
        }
        function search() {
            $("#tb_departments").bootstrapTable("refreshOptions", { pageNumber: 1 });
            reload();
        }
        //添加软件

            parent.layer.open({
                type: 2,
                title: '{$user.username} - 添加软件',

                shade: false,
                offset: '100px',

                offset: '100px',
                area: ['800px', '450px'],

            });
        }

                                        layer.close(index);
                                        reload();
                                    } else {
                                        showToast(data.msg, 'info');
                                    }
                                },
                                error: function () {
                                    layer.close(loadDel);
                                    showToast("系统在开小差，请稍后再试", "info");
                                }
                            });
                        });
                    } else {
                        showToast(res.msg || "获取软件统计信息失败", "info");
                    }
                },
                error: function () {
                    layer.close(loadIndex);
                    showToast("系统在开小差，请稍后再试", "info");
                }
            });
        }
        function sendMsgPage(id) {
            layer.use('extend/layer.ext.js', function () {
                layer.prompt({ title: '群发消息给所有在线用户,socket心跳才可以', formType: 2 }, function (text, index) {
                    if (text.length > 20) {
                        showToast("发送内容不能超过50个字符", "info")
                        return;
                    }
                    layer.close(index);
                    $.ajax({
                        url: "/admin/Soft_User/sendMsgBySid",
                        type: "post",
                        dataType: "json",
                        data: "id=" + id + "&msg=" + text,
                        success: function (data) {
                            if (data.code == 0) {
                                layer.alert(data.msg, {
                                    icon: 1
                                });
                                reload();
                            } else {
                                layer.alert(data.msg, {
                                    icon: 5
                                });
                            }
                        },
                        error: function (XMLHttpRequest, textStatus, errorThrown) {
                            showToast("系统在开小差，请稍后再试", "info");
                        }
                    });
                });
            });
        }
    </script>
