<div class="ibox-content modal-form-shell">
    <form class="form-horizontal" id="editVar">
        <div class="form-horizontal modal-form-body">
            <div class="col-sm-12" style="padding-left: 0px;">
                <div class="form-group" style="display:none !important;">
                    <label class="col-sm-2 control-label"></label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="id" value="{$var.id}">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">所属软件</label>
                    <div class="col-sm-10">
                        <select class="form-control m-b selectpicker" name="sid" id="sid"
                                data-live-search="true"
                                data-live-search-placeholder="搜索"
                                data-style="btn-white"
                                data-size="5" data-container="body">
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">变量名称</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="name" value="{$var.name}"
                               placeholder="请输入变量名称">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">变量内容</label>
                    <div class="col-sm-10">
                        <textarea class="form-control" rows="3" placeholder="请输入内容"
                                  name="value">{$var.value}</textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-12 modal-form-footer">
            <div class="col-sm-offset-5">
                <button class="btn btn-sm btn-white" type="submit">{$sbName}</button>
                &nbsp;&nbsp;
                <button class="btn btn-sm btn-white" type="button" onclick="closeP()">{$cnName}</button>
            </div>
        </div>
    </form>
</div>
<link href="__ADMIN__/css/bootstrap-select.min.css" rel="stylesheet"/>
<script src="__ADMIN__/js/bootstrap-select.min.js"></script>
<script src="__ADMIN__/js/i18n/defaults-zh_CN.min.js"></script>
<script>
    function closeP() {
        var index = parent.layer.getFrameIndex(window.name);
        // parent.layer.close(index); /* User requested popups to stay open */
    }

    (function ($) {
        // Initialise selectpicker
        $('#sid').selectpicker({ size: 5 });

        // Load software list via AJAX
        $.ajax({
            type: 'get',
            url: '/admin/soft/getSoftListsimple.html',
            cache: false,
            dataType: 'json',
            success: function (data) {
                if (data.code < 0) {
                    parent.showToast(data.msg, 'error');
                } else {
                    for (var i = 0; i < data.total; i++) {
                        $("#sid").append($("<option value='" + data.rows[i].id + "'>" + data.rows[i].name + "</option>"));
                    }
                    if ('{$var.id|default="0"}' > 0) {
                        $("#sid").selectpicker('val', '{$var.sid}');
                    }
                    $("#sid").selectpicker("refresh");
                }
            },
            error: function () {
                parent.showToast("网络错误，请稍后重试", 'error');
            }
        });

        // Form validation
        $("#editVar").validate({
            rules: {
                name: { required: true, minlength: 1, maxlength: 20 },
                value: { required: true, minlength: 1, maxlength: 8000 }
            },
            submitHandler: function (form) {
                if ($("#sid").val() == '' || $("#sid").val() == null) {
                    parent.showToast('请先选择所属软件', 'error');
                    return false;
                }
                var formParam = $("#editVar").serialize();
                $.ajax({
                    type: 'post',
                    url: '/admin/soft/addVar.html',
                    data: formParam,
                    cache: false,
                    dataType: 'json',
                    success: function (data) {
                        if (data.code < 0) {
                            parent.showToast(data.msg, 'error');
                        } else {
                            parent.layer.alert(data.msg || '操作成功', {
                                title: '提示',
                                btn: ['知道了']
                            }, function(index){
                                parent.layer.close(index);
                                try {
                                    if (window.parent && window.parent.$ && window.parent.$('.J_iframe:visible').length > 0) {
                                        var ciframe = window.parent.$('.J_iframe:visible')[0].contentWindow;
                                        if (ciframe.reload) { ciframe.reload(); } else { ciframe.location.reload(); }
                                    } else if (window.parent && window.parent.reload && typeof window.parent.reload === 'function') {
                                        window.parent.reload();
                                    }
                                } catch (e) {}
                                var idx = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(idx);
                            });
                        }
                    },
                    error: function () {
                        parent.showToast("网络错误，请稍后重试", 'error');
                    }
                });
            }
        });
    })(jQuery);
</script>
