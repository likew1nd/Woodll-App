<script>
    $.fn.selectpicker.Constructor.DEFAULTS.size = 5;

    var codeValue="";
    function closeP() {
        //关闭iframe页面
        var index = parent.layer.getFrameIndex(window.name); //获取窗口索引
        parent.layer.close(index);
    }


    $(document).ready(function () {
        var editor_two = CodeMirror.fromTextArea(document.getElementById("code2"), {
            lineNumbers: true,
            matchBrackets: true,
            styleActiveLine: true
        });
        codeValue=editor_two.getValue();
        //CodeMirror 不更新textarea内容,jQuery.validator时候无法调用CodeMirror,所以写一个方法validator前更新textarea的内容
        editor_two.on("update", function (Editor, changes) {
            codeValue=editor_two.getValue();
        });
    });
    //jquery加载后执行的
    (function ($) {

        //字母数字
        jQuery.validator.addMethod("alnum", function(value, element) {
            return this.optional(element) || /^[a-zA-Z0-9]+$/.test(value);
        }, "只能包括英文字母和数字");
        //ajax获取用户所有软件数据
        $.ajax({
            type: 'get',
            url: '/admin/soft/getSoftListsimple.html',
            cache: false,
            dataType: 'json',
            success: function (data) {
                //请求成功
                if (data.code < 0) {
                    showToast(data.msg, 'error');
                } else {
                    for (i = 0; i < data.total; i++) {
                        var pack = data.rows[i].name;
                        $("#sid").append($("<option value='" + data.rows[i].id + "'>" + pack + "</option>"))
                    }
                    $("#sid").selectpicker();
                    if ('{$func.id}'>0) //如果是修改用户信息
                    {
                        $("#sid").val('{$func.sid}');
                        $("#sid").selectpicker('val', '{$func.sid}');
                    }
                    $("#sid").selectpicker("refresh");
                }
            },
            error: function () {
                // view("异常！");
                showToast("网络错误！", 'error');
            }
        });
        //表单验证
        var icon = "<i class='fa fa-times-circle'></i> ";
        $("#editVar").validate({
            rules: {
                name: {
                    required: true,
                    minlength: 1,
                    maxlength:20,
                    alnum:true
                },
                value: {
                    required: true,
                    minlength: 1,
                    maxlength:200
                }
            },
            messages: {
                cardValue: {
                    required: icon + "请输入名称 ",
                    minlength: icon + "必须1-20个字符以上",
                    maxlength: icon + "必须1-20个字符以上"
                },
                cardPrice:{
                    required: icon + "请输入内容 ",
                    minlength: icon + "必须1-200个字符以上",
                    maxlength: icon + "必须1-200个字符以上"
                }
            },
            submitHandler: function (form) {
                if($("#sid").val()=='' || $("#sid").val()==null)
                {
                    showToast('所属软件必须选择', 'error');
                    return false;
                }
                //var formParam = $("#editVar").serialize();

				var formData = new FormData();
				formData.append("file",$('#i-file')[0].files[0]);
				formData.append("value",encodeURIComponent(codeValue));
				formData.append("id",$('input[name="id"]').val());
				formData.append("sid",$("#sid").val());
				formData.append("name",$('input[name="name"]').val());
                //formParam=formParam+"&file="+crowd_file+"&value="+ encodeURIComponent(codeValue);
                //ajax提交更新用户数据
                $.ajax({
                    type: 'post',
                    url: '/admin/soft/addRemoteFunction.html',
                    data: formData,
                    cache: false,
                    dataType: 'json',
					async: false,
					data: formData,
					processData : false, // 使数据不做处理
					contentType : false, // 不要设置Content-Type请求头
                    success: function (data) {
                        //请求成功
                        if (data.code < 0) {
                            showToast(data.msg, 'error');
                        } else {
                            parent.layer.alert(data.msg || '操作成功', {
                                title: '提示',
                                btn: ['知道了']
                            }, function(index){
                                parent.layer.close(index);
                                try {
                                    if (window.parent && window.parent.$ && window.parent.$('.J_iframe:visible').length > 0) {
                                        var ciframe = window.parent.$('.J_iframe:visible')[0].contentWindow;
                                        if (ciframe.reload) { ciframe.reload(); } else { ciframe.location.reload(); }
                                    } else if (window.parent && window.parent.reload && typeof window.parent.reload === 'function') {
                                        window.parent.reload();
                                    }
                                } catch (e) {}
                                var idx = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(idx);
                            });

                        }
                    },
                    error: function () {
                        // view("异常！");
                        showToast("网络错误！", "error");
                    }
                });
            }
        });
    })(jQuery);
    function getSelectedText(name){
        var obj=document.getElementById(name);
        for(i=0;i<obj.length;i++){
            if(obj[i].selected==true){
                return obj[i].innerText; //关键是通过option对象的innerText属性获取到选项文本
            }
        }
    }
</script>
